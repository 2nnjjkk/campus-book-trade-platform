{% extends "base.html" %}

{% block title %}登录 - 校园二手书交易{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2 class="form-title">🔑 用户登录</h2>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="student_id">学号</label>
                <input
                    type="text"
                    id="student_id"
                    name="student_id"
                    class="form-input"
                    placeholder="请输入学号"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="请输入密码"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>

        <p class="form-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}
