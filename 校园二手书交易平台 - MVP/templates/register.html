{% extends "base.html" %}

{% block title %}注册 - 校园二手书交易{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2 class="form-title">📝 用户注册</h2>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="student_id">学号</label>
                <input
                    type="text"
                    id="student_id"
                    name="student_id"
                    class="form-input"
                    placeholder="请输入学号（用作登录账号）"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="nickname">昵称</label>
                <input
                    type="text"
                    id="nickname"
                    name="nickname"
                    class="form-input"
                    placeholder="给自己起个名字吧"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="至少 6 位密码"
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    class="form-input"
                    placeholder="请再次输入密码"
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>

        <p class="form-footer">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </p>
    </div>
</div>
{% endblock %}
